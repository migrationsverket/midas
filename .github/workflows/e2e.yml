name: 'e2e'

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches:
      - main

permissions:
  contents: read

jobs:
  e2e:
    name: E2E registry tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps
        env:
          PLAYWRIGHT_DOWNLOAD_CONNECTION_TIMEOUT: 60000

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Start Verdaccio
        run: npx verdaccio --config .verdaccio/config.yaml --listen 4873 &

      - name: Publish packages to local registry
        run: npx nx run @midas-ds/source:release:local --skipVerdaccioStart

      - name: Install from registry
        run: npm install --prefix apps/next --@midas-ds:registry=http://localhost:4873/

      - name: Remove dist files
        run: rm -rf dist

      - name: Build and test e2e project
        run: npx nx e2e next
        env:
          E2E_REGISTRY: true
